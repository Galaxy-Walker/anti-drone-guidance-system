guidance_node_2d:
  ros__parameters:
    algorithm: pn_mppi
    scenario: circle

    control_rate_hz: 20.0

    pursuer_namespace: /px4_1
    target_namespace: /px4_2

    auto_arm: true
    auto_offboard: true
    offboard_warmup_cycles: 20

    sim_time: 40.0
    dt: 0.05

    # 追踪机固定高度，ENU z 正向向上。
    pursuer_fixed_altitude: 8.0

    # Gazebo 目标机固定在离地 1m，ENU z 正向向上。
    target_base_altitude: 1.0

    target_start_position_tolerance: 0.75
    target_start_velocity_tolerance: 0.75

    pursuer_system_id: 1
    target_system_id: 2

    record_data: true
    record_output_dir: outputs/gazebo2d
